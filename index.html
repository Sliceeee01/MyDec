<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slicemes - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles"></div>
    
    <div class="main-screen">
        <header class="desktop-header">
            <div class="desktop-title">
                <span class="title-icon">⬡</span>
                Slicemes
            </div>
            <div class="desktop-status">
                <span class="status-dot"></span>
                <span class="status-text">Система онлайн</span>
            </div>
        </header>

        <main class="desktop-main">
            <div class="login-center">
                <div class="login-icon-wrapper">
                    <div class="login-icon">⬢</div>
                    <div class="login-ring"></div>
                </div>
                <button id="loginBtn" class="login-btn">
                    <span class="btn-text">Вход в систему</span>
                    <span class="btn-icon">→</span>
                </button>
                <p class="login-hint">Нажмите для авторизации</p>
            </div>
        </main>
    </div>

    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <button class="close-modal">✕</button>
            
            <div id="loginFormContainer">
                <div class="modal-header">
                    <div class="modal-icon">⬡</div>
                    <h2 class="modal-title">Вход в систему</h2>
                </div>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label>Email или ID</label>
                        <input type="text" id="loginEmail" placeholder="your@email.com или IDXXXXXXXX" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">Войти</button>
                    
                    <div class="form-links">
                        <a href="#" id="showRegister">Регистрация</a>
                        <span>|</span>
                        <a href="#" id="showForgot">Забыли пароль?</a>
                    </div>
                </form>
            </div>

            <!-- Регистрация -->
            <div id="registerFormContainer" style="display: none;">
                <div class="modal-header">
                    <div class="modal-icon">⬡</div>
                    <h2 class="modal-title">Регистрация</h2>
                </div>
                
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regName" placeholder="Ваше имя" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="Минимум 6 символов" required>
                    </div>

                    <div class="form-group">
                        <label>Подтверждение</label>
                        <input type="password" id="regConfirmPassword" placeholder="Повторите пароль" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">Зарегистрироваться</button>
                    
                    <div class="form-links">
                        <a href="#" id="showLoginFromReg">Уже есть аккаунт? Войти</a>
                    </div>
                </form>
            </div>

            <!-- Восстановление пароля -->
            <div id="forgotFormContainer" style="display: none;">
                <div class="modal-header">
                    <div class="modal-icon">⬡</div>
                    <h2 class="modal-title">Восстановление пароля</h2>
                </div>
                
                <form id="forgotForm" class="auth-form">
                    <div class="form-group">
                        <label>Email или ID</label>
                        <input type="text" id="forgotIdentifier" placeholder="your@email.com или IDXXXXXXXX" required>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="checkUserBtn">Проверить</button>
                    
                    <div class="form-links">
                        <a href="#" id="showLoginFromForgot">Вернуться ко входу</a>
                    </div>
                </form>
            </div>

            <!-- Окно сброса пароля -->
            <div id="resetFormContainer" style="display: none;">
                <div class="modal-header">
                    <div class="modal-icon">⬡</div>
                    <h2 class="modal-title">Создание нового пароля</h2>
                </div>
                
                <form id="resetForm" class="auth-form">
                    <div class="form-group">
                        <label>Новый пароль</label>
                        <input type="password" id="newPassword" placeholder="Минимум 6 символов" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Повторите пароль</label>
                        <input type="password" id="confirmNewPassword" placeholder="Повторите пароль" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">Сохранить пароль</button>
                    
                    <div class="form-links">
                        <a href="#" id="showLoginFromReset">Вернуться ко входу</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Система уведомлений -->
    <div id="toast" class="toast" style="display: none;"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, get, push, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCK5MTHhq15C_aFTS2prR2QrM-U4F2kgJo",
            authDomain: "mydesktop-chat.firebaseapp.com",
            databaseURL: "https://mydesktop-chat-default-rtdb.firebaseio.com",
            projectId: "mydesktop-chat",
            storageBucket: "mydesktop-chat.firebasestorage.app",
            messagingSenderId: "422339167016",
            appId: "1:422339167016:web:faa470c10bd0ccdef9861d"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // ========== УВЕДОМЛЕНИЯ ==========
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (isError ? 'toast-error' : 'toast-success');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    toast.style.display = 'none';
                    toast.style.opacity = '1';
                }, 300);
            }, 3000);
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        async function findUserByIdentifier(identifier) {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const users = snapshot.val();
            if (!users) return null;
            
            for (let key in users) {
                if (users[key].email === identifier.toLowerCase() || users[key].uniqueId === identifier.toUpperCase()) {
                    return { ...users[key], id: key };
                }
            }
            return null;
        }
        
        async function findUserByEmail(email) {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const users = snapshot.val();
            if (!users) return null;
            
            for (let key in users) {
                if (users[key].email === email.toLowerCase()) {
                    return { ...users[key], id: key };
                }
            }
            return null;
        }
        
        async function addUser(name, email, password) {
            const usersRef = ref(db, 'users');
            const newUserRef = push(usersRef);
            const uniqueId = 'ID' + Math.random().toString(36).substr(2, 8).toUpperCase();
            
            const userData = {
                name: name,
                email: email.toLowerCase(),
                password: password,
                uniqueId: uniqueId,
                friends: [],
                createdAt: new Date().toISOString()
            };
            
            await set(newUserRef, userData);
            return { ...userData, id: newUserRef.key };
        }
        
        async function updatePassword(userId, newPassword) {
            await update(ref(db, 'users/' + userId), { password: newPassword });
        }
        
        // ========== РАБОТА С МОДАЛКОЙ ==========
        const loginBtn = document.getElementById('loginBtn');
        const modal = document.getElementById('loginModal');
        const closeBtns = document.querySelectorAll('.close-modal');
        
        const loginContainer = document.getElementById('loginFormContainer');
        const registerContainer = document.getElementById('registerFormContainer');
        const forgotContainer = document.getElementById('forgotFormContainer');
        const resetContainer = document.getElementById('resetFormContainer');
        
        let resetUserId = null;
        
        function openModal() {
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            modal.classList.remove('show');
            document.body.style.overflow = 'auto';
            showForm('login');
            resetUserId = null;
        }
        
        loginBtn.onclick = openModal;
        closeBtns.forEach(btn => btn.onclick = closeModal);
        modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        
        function showForm(type) {
            loginContainer.style.display = 'none';
            registerContainer.style.display = 'none';
            forgotContainer.style.display = 'none';
            resetContainer.style.display = 'none';
            if (type === 'login') loginContainer.style.display = 'block';
            if (type === 'register') registerContainer.style.display = 'block';
            if (type === 'forgot') forgotContainer.style.display = 'block';
            if (type === 'reset') resetContainer.style.display = 'block';
        }
        
        document.getElementById('showRegister').onclick = (e) => { e.preventDefault(); showForm('register'); };
        document.getElementById('showForgot').onclick = (e) => { e.preventDefault(); showForm('forgot'); };
        document.getElementById('showLoginFromReg').onclick = (e) => { e.preventDefault(); showForm('login'); };
        document.getElementById('showLoginFromForgot').onclick = (e) => { e.preventDefault(); showForm('login'); };
        document.getElementById('showLoginFromReset').onclick = (e) => { e.preventDefault(); showForm('login'); };
        
        // ========== РЕГИСТРАЦИЯ ==========
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!name || !email || !password) {
                showToast('Заполните все поля', true);
                return;
            }
            
            if (password !== confirm) {
                showToast('Пароли не совпадают', true);
                return;
            }
            
            if (password.length < 6) {
                showToast('Пароль минимум 6 символов', true);
                return;
            }
            
            const existingUser = await findUserByEmail(email);
            if (existingUser) {
                showToast('Email уже используется', true);
                return;
            }
            
            const newUser = await addUser(name, email, password);
            showToast(`✅ Регистрация успешна! Ваш ID: ${newUser.uniqueId}`);
            
            showForm('login');
            document.getElementById('loginEmail').value = email;
        };
        
        // ========== ВХОД ==========
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!identifier || !password) {
                showToast('Заполните все поля', true);
                return;
            }
            
            const user = await findUserByIdentifier(identifier);
            
            if (user && user.password === password) {
                const userData = {
                    email: user.email,
                    name: user.name,
                    uniqueId: user.uniqueId
                };
                
                localStorage.setItem('currentUser', JSON.stringify(userData));
                showToast(`✅ Добро пожаловать, ${user.name}!`);
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 500);
            } else {
                showToast('❌ Неверный email/ID или пароль', true);
            }
        };
        
        // ========== ВОССТАНОВЛЕНИЕ ==========
        document.getElementById('forgotForm').onsubmit = async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('forgotIdentifier').value.trim();
            
            if (!identifier) {
                showToast('Введите email или ID', true);
                return;
            }
            
            const user = await findUserByIdentifier(identifier);
            
            if (!user) {
                showToast('❌ Пользователь не найден', true);
                return;
            }
            
            resetUserId = user.id;
            showForm('reset');
            showToast(`✅ Пользователь найден: ${user.name}`);
        };
        
        // ========== УСТАНОВКА НОВОГО ПАРОЛЯ ==========
        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (!newPassword || !confirmPassword) {
                showToast('Введите новый пароль', true);
                return;
            }
            
            if (newPassword.length < 6) {
                showToast('Пароль минимум 6 символов', true);
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showToast('Пароли не совпадают', true);
                return;
            }
            
            if (resetUserId) {
                await updatePassword(resetUserId, newPassword);
                showToast('✅ Пароль успешно изменён!');
                showForm('login');
                resetUserId = null;
            } else {
                showToast('❌ Ошибка: пользователь не найден', true);
            }
        };
        
        console.log('✅ Все обработчики событий загружены');
    </script>
</body>
</html>
