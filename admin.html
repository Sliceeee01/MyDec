<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slicemes - Админ панель</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        /* Стили только для админки */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .admin-title {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .admin-stat-card {
            background: rgba(20,20,20,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .admin-stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #00ff88;
        }
        
        .admin-stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
        }
        
        .admin-card {
            background: rgba(20,20,20,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        
        .users-table {
            background: rgba(20,20,20,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .users-table-header {
            display: grid;
            grid-template-columns: 50px 1fr 1.5fr 1fr 110px 110px 100px;
            background: rgba(0,0,0,0.3);
            padding: 14px 16px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .user-row {
            display: grid;
            grid-template-columns: 50px 1fr 1.5fr 1fr 110px 110px 100px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center;
            font-size: 13px;
            transition: background 0.2s;
        }
        
        .user-row:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .user-avatar-small {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .ban-badge {
            background: rgba(255,68,68,0.2);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            display: inline-block;
            color: #ff6666;
        }
        
        .active-badge {
            background: rgba(0,255,136,0.15);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            display: inline-block;
            color: #00ff88;
        }
        
        .admin-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            margin: 0 3px;
        }
        
        .admin-btn-danger {
            color: #ff6666;
        }
        
        .admin-btn-danger:hover {
            background: rgba(255,68,68,0.15);
            border-color: #ff6666;
        }
        
        .admin-btn-warning {
            color: #ffaa66;
        }
        
        .admin-btn-warning:hover {
            background: rgba(255,170,0,0.15);
            border-color: #ffaa66;
        }
        
        .ban-duration {
            width: 70px;
            padding: 6px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            font-size: 11px;
            cursor: pointer;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,68,68,0.3);
            transition: 0.3s;
            border-radius: 28px;
            border: 1px solid rgba(255,68,68,0.3);
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 2px;
            background-color: #ff6666;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: rgba(0,255,136,0.2);
            border-color: rgba(0,255,136,0.3);
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(24px);
            background-color: #00ff88;
        }
        
        .status-online {
            color: #00ff88;
        }
        
        .status-offline {
            color: #ff6666;
        }
        
        @media (max-width: 768px) {
            .admin-container {
                padding: 15px;
            }
            
            .users-table-header {
                display: none;
            }
            
            .user-row {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 15px;
            }
            
            .user-row > div {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .user-row > div::before {
                content: attr(data-label);
                font-size: 11px;
                color: rgba(255,255,255,0.5);
            }
            
            .admin-stats {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <script>
        // Применяем сохранённую тему при загрузке страницы
        const savedTheme = localStorage.getItem('appTheme') || 'dark';
        document.documentElement.classList.add(`theme-${savedTheme}`);
    </script>
    <div class="particles"></div>
    
    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-title">
                <span class="logo-icon">⬡</span>
                Slicemes - Админ панель
            </div>
            <button id="logoutAdminBtn" class="logout-sidebar-btn">Выйти</button>
        </div>
        
        <div class="admin-stats">
            <div class="admin-stat-card">
                <div class="admin-stat-value" id="totalUsers">0</div>
                <div class="admin-stat-label">Всего пользователей</div>
            </div>
            <div class="admin-stat-card">
                <div class="admin-stat-value" id="activeUsers">0</div>
                <div class="admin-stat-label">Активных</div>
            </div>
            <div class="admin-stat-card">
                <div class="admin-stat-value" id="bannedUsers">0</div>
                <div class="admin-stat-label">Заблокированных</div>
            </div>
        </div>
        
        <!-- Переключатель технических работ -->
        <div class="admin-card">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h3 style="margin-bottom: 5px;">Режим технических работ</h3>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5);">При включении обычные пользователи не смогут войти</p>
                </div>
                <div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="maintenanceToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <div id="maintenanceStatus" style="margin-top: 15px; font-size: 13px;"></div>
        </div>
        
        <div class="users-table">
            <div class="users-table-header">
                <div>Аватар</div>
                <div>Имя</div>
                <div>Email / ID</div>
                <div>Регистрация</div>
                <div>Статус</div>
                <div>Блокировка</div>
                <div>Действия</div>
            </div>
            <div id="usersList"></div>
        </div>
    </div>
    
    <div id="toast" class="toast" style="display: none;"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, get, update, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCK5MTHhq15C_aFTS2prR2QrM-U4F2kgJo",
            authDomain: "mydesktop-chat.firebaseapp.com",
            databaseURL: "https://mydesktop-chat-default-rtdb.firebaseio.com",
            projectId: "mydesktop-chat",
            storageBucket: "mydesktop-chat.firebasestorage.app",
            messagingSenderId: "422339167016",
            appId: "1:422339167016:web:faa470c10bd0ccdef9861d"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentAdmin = null;
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (isError ? 'toast-error' : 'toast-success');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    toast.style.display = 'none';
                    toast.style.opacity = '1';
                }, 300);
            }, 3000);
        }
        
        function formatLastSeen(timestamp) {
            if (!timestamp) return 'никогда';
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'только что';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} мин назад`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} ч назад`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days} дн назад`;
            return new Date(timestamp).toLocaleDateString();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadUsers() {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const users = snapshot.val();
            
            if (!users) return;
            
            const usersArray = Object.entries(users).map(([key, user]) => ({
                id: key,
                ...user
            }));
            
            const now = Date.now();
            const total = usersArray.length;
            const active = usersArray.filter(u => (!u.isBanned || u.banExpires < now) && (now - (u.lastSeen || 0) < 60000)).length;
            const banned = usersArray.filter(u => u.isBanned && u.banExpires > now).length;
            
            document.getElementById('totalUsers').textContent = total;
            document.getElementById('activeUsers').textContent = active;
            document.getElementById('bannedUsers').textContent = banned;
            
            const container = document.getElementById('usersList');
            container.innerHTML = usersArray.map(user => {
                const isBanned = user.isBanned && user.banExpires > now;
                const isOnline = !isBanned && (now - (user.lastSeen || 0) < 60000);
                const regDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '—';
                
                return `
                    <div class="user-row" data-id="${user.id}">
                        <div data-label="Аватар">
                            <div class="user-avatar-small">
                                ${user.avatar ? `<img src="${user.avatar}">` : '👤'}
                            </div>
                        </div>
                        <div data-label="Имя"><strong>${escapeHtml(user.name || '—')}</strong></div>
                        <div data-label="Email / ID">
                            ${escapeHtml(user.email || '—')}<br>
                            <span style="font-size:10px;color:#888">${escapeHtml(user.uniqueId || '—')}</span>
                        </div>
                        <div data-label="Регистрация">${regDate}</div>
                        <div data-label="Статус">
                            ${isBanned ? 
                                `<span class="ban-badge">Заблокирован</span>` : 
                                `<span class="active-badge">${isOnline ? 'В сети' : `Был(а) ${formatLastSeen(user.lastSeen)}`}</span>`
                            }
                        </div>
                        <div data-label="Блокировка">
                            <select class="ban-duration" id="banSelect_${user.id}">
                                <option value="0">Снять</option>
                                <option value="1">1 час</option>
                                <option value="24">1 день</option>
                                <option value="168">7 дней</option>
                                <option value="720">30 дней</option>
                                <option value="forever">Навсегда</option>
                            </select>
                        </div>
                        <div data-label="Действия">
                            <button class="admin-btn admin-btn-danger" onclick="window.deleteUser('${user.id}')">Удалить</button>
                            <button class="admin-btn admin-btn-warning" onclick="window.applyBan('${user.id}')">Блок</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        window.deleteUser = async (userId) => {
            if (confirm('Удалить пользователя навсегда? Все данные будут потеряны!')) {
                await remove(ref(db, 'users/' + userId));
                showToast('Пользователь удален');
                await loadUsers();
            }
        };
        
        window.applyBan = async (userId) => {
            const select = document.getElementById(`banSelect_${userId}`);
            const hours = select.value;
            
            let banExpires = null;
            let isBanned = false;
            
            if (hours === '0') {
                isBanned = false;
                banExpires = null;
                showToast('Блокировка снята');
            } else if (hours === 'forever') {
                isBanned = true;
                banExpires = 9999999999999;
                showToast('Пользователь заблокирован навсегда');
            } else {
                isBanned = true;
                banExpires = Date.now() + (parseInt(hours) * 60 * 60 * 1000);
                showToast(`Пользователь заблокирован на ${hours} часов`);
            }
            
            await update(ref(db, 'users/' + userId), {
                isBanned: isBanned,
                banExpires: banExpires
            });
            
            await loadUsers();
        };
        
        async function checkAdmin() {
            const adminSession = sessionStorage.getItem('adminSession');
            if (!adminSession) {
                window.location.href = 'index.html';
                return;
            }
            currentAdmin = JSON.parse(adminSession);
            if (currentAdmin.email !== 'admin@mail.ru') {
                window.location.href = 'index.html';
            }
        }
        
        async function loadMaintenanceSettings() {
            try {
                const settingsRef = ref(db, 'settings');
                const snapshot = await get(settingsRef);
                const settings = snapshot.val();
                const isOnline = settings?.isSiteOnline !== false;
                
                const toggle = document.getElementById('maintenanceToggle');
                const statusDiv = document.getElementById('maintenanceStatus');
                
                if (toggle) {
                    toggle.checked = isOnline;
                    statusDiv.innerHTML = isOnline ? 
                        '<span class="status-online">● Сайт работает в обычном режиме</span>' : 
                        '<span class="status-offline">● Режим технических работ включен. Пользователи не могут войти.</span>';
                    
                    toggle.onchange = async () => {
                        const newStatus = toggle.checked;
                        
                        try {
                            await update(ref(db, 'settings'), {
                                isSiteOnline: newStatus
                            });
                            
                            statusDiv.innerHTML = newStatus ? 
                                '<span class="status-online">● Сайт работает в обычном режиме</span>' : 
                                '<span class="status-offline">● Режим технических работ включен. Пользователи не могут войти.</span>';
                            showToast(newStatus ? 'Сайт включен' : 'Режим тех. работ включен');
                        } catch (error) {
                            console.error('Ошибка сохранения:', error);
                            showToast('Ошибка сохранения', true);
                            toggle.checked = !newStatus;
                        }
                    };
                }
            } catch (error) {
                console.error('Ошибка загрузки настроек:', error);
            }
        }
        
        document.getElementById('logoutAdminBtn').onclick = () => {
            sessionStorage.removeItem('adminSession');
            window.location.href = 'index.html';
        };
        
        await checkAdmin();
        await loadUsers();
        await loadMaintenanceSettings();
    </script>
</body>
</html>
